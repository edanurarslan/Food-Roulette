version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: food_roulette_postgres
    environment:
      POSTGRES_USER: food_user
      POSTGRES_PASSWORD: your_secure_password
      POSTGRES_DB: food_roulette_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - food_roulette_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U food_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: food_roulette_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - food_roulette_network

volumes:
  postgres_data:

networks:
  food_roulette_network:
    driver: bridge
